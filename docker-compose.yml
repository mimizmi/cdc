version: "3.9"

services:
  # ===== MySQL 源库 =====
  mysql:
    image: mysql:8.0
    container_name: cdc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hospital_his
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-row-image=FULL
      --expire-logs-days=3
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init_mysql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== SQL Server 源库 =====
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cdc-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Pass123"
      MSSQL_AGENT_ENABLED: "true"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong!Pass123" -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10

  # ===== Kafka (KRaft 模式，无需 ZooKeeper) =====
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cdc-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list || exit 1
      interval: 15s
      timeout: 10s
      retries: 5

  # ===== Kafka UI (可选，方便查看消息) =====
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cdc-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"

  # ===== PostgreSQL ODS =====
  postgres:
    image: postgres:16
    container_name: cdc-postgres
    environment:
      POSTGRES_USER: ods_user
      POSTGRES_PASSWORD: ods_pass
      POSTGRES_DB: hospital_ods
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ods_user -d hospital_ods"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Prometheus =====
  prometheus:
    image: prom/prometheus:latest
    container_name: cdc-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # ===== Grafana =====
  grafana:
    image: grafana/grafana:latest
    container_name: cdc-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  # ===== CDC Platform =====
  cdc-platform:
    build: .
    container_name: cdc-platform
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SOURCES_CONFIG: /app/configs/sources.yaml
      TOPICS_CONFIG: /app/configs/topics.yaml
      OFFSET_STORE_PATH: /app/data/offsets/offsets.db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MYSQL_HOST: mysql
      MYSQL_USER: cdc_user
      MYSQL_PASSWORD: cdc_pass
      SQLSERVER_HOST: sqlserver
      SQLSERVER_USER: sa
      SQLSERVER_PASSWORD: "YourStrong!Pass123"
      PG_HOST: postgres
      PG_USER: ods_user
      PG_PASSWORD: ods_pass
      PG_DATABASE: hospital_ods
      LOG_LEVEL: info
      METRICS_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - offset-data:/app/data/offsets

volumes:
  mysql-data:
  sqlserver-data:
  kafka-data:
  postgres-data:
  grafana-data:
  offset-data:
